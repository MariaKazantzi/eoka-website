<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tab 3</title>
    <link rel="stylesheet" href="/style/style.css">
    <script src="/js/translations.js"></script>
    <script src="/js/translate.js"></script>
</head>
<body>

    <header class="header">
        <div class="header-content">
            <div class="logo">
                <div class="logo-box">LOGO</div>
            </div>
            <div class="search-box">
                <input type="text" placeholder="Search..." data-translate-placeholder="search-placeholder">
            </div>
            <nav class="header-tabs">
                <a class="tab" href="/html/index.html" data-translate="home">ΑΡΧΙΚΗ</a>
                <a class="tab" href="/html/tab2.html" data-translate="calendar">ΗΜΕΡΟΛΟΓΙΟ</a>
                <a class="tab active" href="/html/tab3.html" data-translate="people">ΣΥΜΜΕΤΕΧΟΝΤΕΣ3</a>
                <a class="tab" href="/html/tab4.html" data-translate="documents">ΕΓΓΡΑΦΑ</a>
                <a class="tab" href="/html/tab5.html" data-translate="contact">CONTACT</a>
            </nav>

            <div class="language-switcher">
                <button class="lang-btn active" data-lang="el">ΕΛ</button>
                <button class="lang-btn" data-lang="en">EN</button>
            </div>
        </div>
    </header>

    <div class="container">
    <main class="content">
        <div style="display: flex; flex-direction: column; align-items: center; width: 100%;">
            <h1 data-translate="people-title" style="align-self: flex-start;">ΣΥΜΜΕΤΕΧΟΝΤΕΣ</h1>
            <iframe src="/html/names/generated/namesList.html" style="width:100%; min-height:500px; border:none; flex: 1 1 auto;"></iframe>
        </div>
    </main>
</div>
    
    <script>
        function handleGroupFilter(value) {
            if (!value) return;
            
            // Navigate to names.html with the selected group
            window.location.href = `names.html?group=${value}`;
        }

        // Handle option translations
        document.addEventListener('DOMContentLoaded', function() {
            updateSelectOptions();
            window.addEventListener('languageChanged', updateSelectOptions);
        });

        function updateSelectOptions() {
            const currentLang = localStorage.getItem('language') || 'el';
            const select = document.getElementById('groupFilter');
            const currentValue = select.value;
            select.innerHTML = '';

            options.forEach(opt => {
                const option = document.createElement('option');
                option.value = opt.value;
                option.textContent = currentLang === 'en' ? opt.en : opt.el;
                select.appendChild(option);
            });

            select.value = currentValue;
        }
    </script>
</body>
</html>
