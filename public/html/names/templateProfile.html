<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Dummy Template</title>
</head>
<body>
	<!--
		CSV Columns:
		ΗΜΕΡΟΜΗΝΙΑ / DATE
		ΕΠΩΝΥΜΟ / SURNAME
		ΟΝΟΜΑ / NAME
		ΟΝΟΜΑΤΕΠΩΝΥΜΟ / FULL NAME
		Α/Θ / M/F
		ΕΘΝΙΚΟΤΗΤΑ / NATIONALITY
		ΙΔΙΟΤΗΤΑ / CAPACITY
		ΑΡΙΘΜΟΣ ΜΗΤΡΩΟΥ / SERVICE NUMBER
		ΒΑΘΜΟΣ / RANK
		ΜΟΝΑΔΑ / UNIT
		ACCEPTED (dont use)
		example usage: {{DATE}}
	-->
	<div class="profile-card" style="max-width: 600px; margin: 40px auto; padding: 24px; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); background: #fff; font-family: Arial, sans-serif;">
		<h2 style="margin-bottom: 8px; color: #2c3e50;">{{FULL NAME}}</h2>
		<hr style="margin-bottom: 16px;">
		<table style="width: 100%; border-collapse: collapse;">
			<tr><td style="font-weight: bold; color: #888;">ΗΜΕΡΟΜΗΝΙΑ / DATE</td><td>{{DATE}}</td></tr>
			<tr><td style="font-weight: bold; color: #888;">ΕΠΩΝΥΜΟ / SURNAME</td><td>{{SURNAME}}</td></tr>
			<tr><td style="font-weight: bold; color: #888;">ΟΝΟΜΑ / NAME</td><td>{{NAME}}</td></tr>
			<tr><td style="font-weight: bold; color: #888;">Α/Θ / M/F</td><td>{{M/F}}</td></tr>
			<tr><td style="font-weight: bold; color: #888;">ΕΘΝΙΚΟΤΗΤΑ / NATIONALITY</td><td>{{NATIONALITY}}</td></tr>
			<tr><td style="font-weight: bold; color: #888;">ΙΔΙΟΤΗΤΑ / CAPACITY</td><td>{{CAPACITY}}</td></tr>
			<tr><td style="font-weight: bold; color: #888;">ΑΡΙΘΜΟΣ ΜΗΤΡΩΟΥ / SERVICE NUMBER</td><td>{{SERVICE NUMBER}}</td></tr>
			<tr><td style="font-weight: bold; color: #888;">ΒΑΘΜΟΣ / RANK</td><td>{{RANK}}</td></tr>
			<tr><td style="font-weight: bold; color: #888;">ΜΟΝΑΔΑ / UNIT</td><td>{{UNIT}}</td></tr>
		</table>
		<div style="margin-top: 24px; text-align: right;">
			<a href="/html/tab3.html" style="display: inline-block; padding: 8px 18px; background: #3498db; color: #fff; border-radius: 6px; text-decoration: none; font-weight: bold; box-shadow: 0 1px 4px rgba(52,152,219,0.15);">&larr; Back</a>
		</div>
	</div>
</body>
</html>
